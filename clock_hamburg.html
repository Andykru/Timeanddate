<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Uhr Hamburg</title>
<style>
  body {
    margin: 0;
    background-color: white;
    color: #000E53;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
  }
  #clock {
    font-size: 24px;
    font-weight: bold;
  }
  #date {
    font-size: 24px;
    margin-top: 10px;
  }
</style>
</head>
<body>

<div id="clock">00:00</div>
<div id="date"></div>

<script>
function getWeekNumber(d) {
    d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
    var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
    var weekNo = Math.ceil((((d - yearStart) / 86400000) + 1)/7);
    return weekNo;
}

function updateClock() {
    const now = new Date();

    // Hamburg = Europe/Berlin
    const options = { timeZone: 'Europe/Berlin' };
    const berlinTime = new Date(now.toLocaleString("en-US", options));

    const hours = berlinTime.getHours().toString().padStart(2,'0');
    const minutes = berlinTime.getMinutes().toString().padStart(2,'0');
    document.getElementById('clock').textContent = hours + ":" + minutes;

    const days = ["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];
    const months = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];

    const dayName = days[berlinTime.getDay()];
    const day = berlinTime.getDate().toString().padStart(2,'0');
    const month = months[berlinTime.getMonth()];
    const year = berlinTime.getFullYear();

    const week = getWeekNumber(berlinTime);

    document.getElementById('date').textContent =
        dayName + ", " + day + ". " + month + " " + year + " (KW " + week + ")";
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
